<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TMK Suite — Solo System Architect. Platforma tradingowa, symulator portfela, komparator danych i downloader świec. Wszystko zbudowane z pomocą AI.">
  <meta name="author" content="TMK Suite">
  <meta property="og:title" content="TMK Suite — Solo System Architect">
  <meta property="og:description" content="Profesjonalne narzędzia do handlu algorytmicznego. Zbudowane w 100% z pomocą AI.">
  <meta property="og:image" content="https://tmk-tunnel.pl/assets/images/og-image.webp">
  <meta property="og:url" content="https://tmk-tunnel.pl">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>TMK Suite — Solo System Architect</title>
  <link rel="icon" type="image/x-icon" href="/assets/images/tmk-favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #000000;
      --color-text: #E6EDF3;
      --color-accent: #58A6FF;
      --color-accent-glow: rgba(88, 166, 255, 0.12);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      font-family: 'Inter', sans-serif;
      color: var(--color-text);
      overflow: hidden;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at center, #000000 85%, #0a0f14 100%);
      overflow: hidden;
    }


    .logo-container {
      position: relative;
      z-index: 1;
      animation: fadeInScale 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    .logo-container img {
      width: min(600px, 75vw);
      height: auto;
      display: block;
    }

    .tagline {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--color-text);
      opacity: 0.6;
      letter-spacing: 0.08em;
      text-align: center;
      white-space: nowrap;
      animation: fadeIn 1s 0.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 0.6; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-container">
      <img
        src="/assets/images/logo-hero.webp"
        alt="TMK Suite Logo"
        width="1600"
        height="1519"
      >
    </div>
    <p class="tagline">
      Solo system architect
    </p>
  </div>
</body>
</html>
