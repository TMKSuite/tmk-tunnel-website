<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TMK Suite — Solo System Architect. Platforma tradingowa, symulator portfela, komparator danych i downloader świec. Wszystko zbudowane z pomocą AI.">
  <meta name="author" content="TMK Suite">
  <meta property="og:title" content="TMK Suite — Solo System Architect">
  <meta property="og:description" content="Profesjonalne narzędzia do handlu algorytmicznego. Zbudowane w 100% z pomocą AI.">
  <meta property="og:image" content="https://tmk-tunnel.pl/assets/images/og-image.webp">
  <meta property="og:url" content="https://tmk-tunnel.pl">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>TMK Suite — Solo System Architect</title>
  <link rel="icon" type="image/x-icon" href="/assets/images/tmk-favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #000000;
      --color-text: #E6EDF3;
      --color-accent: #D4A843;
      --color-accent-glow: rgba(212, 168, 67, 0.12);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      font-family: 'Inter', sans-serif;
      color: var(--color-text);
    }

    /* ── NAVBAR NA DOLE (domyslny desktop) ── */
    .nav-sidebar {
      position: fixed;
      z-index: 10;
      display: flex;
      animation: fadeInNav 1s 0.3s ease both;
    }

    .nav-left {
      left: 0;
      right: 0;
      top: auto;
      bottom: 0;
      transform: none;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 1rem 2rem;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100vw;
      box-sizing: border-box;
    }

    .nav-link {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(230, 237, 243, 0.45);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s ease;
      position: relative;
      opacity: 0;
      animation: fadeInLink 0.5s ease forwards;
    }

    .nav-link::before { display: none; }

    .nav-link:hover,
    .nav-link.active {
      color: var(--color-accent);
    }

    @keyframes fadeInNav {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .nav-link {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(230, 237, 243, 0.45);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s ease, opacity 0.3s ease;
      position: relative;
      padding-left: 1.4rem;
      opacity: 0;
      animation: fadeInLink 0.5s ease forwards;
    }
    .nav-link:nth-child(1) { animation-delay: 0.4s; }
    .nav-link:nth-child(2) { animation-delay: 0.65s; }
    .nav-link:nth-child(3) { animation-delay: 0.9s; }
    .nav-link:nth-child(4) { animation-delay: 1.15s; }
    .nav-link:nth-child(5) { animation-delay: 1.4s; }

    @keyframes fadeInLink {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .nav-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(230, 237, 243, 0.2);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--color-accent);
    }

    .nav-link:hover::before,
    .nav-link.active::before {
      background: var(--color-accent);
      box-shadow: 0 0 8px var(--color-accent);
    }

    /* ── APLIKACJE W PRAWYM GÓRNYM ROGU ── */
    .app-wrapper {
      position: fixed;
      right: 2.5rem;
      top: 2.5rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeInNav 1s 0.5s ease both;
    }

    .app-showcase {
      display: flex;
      flex-direction: row;
      gap: 1.2rem;
    }

    .app-item {
      cursor: default;
      position: relative;
      transition: transform 0.3s ease, filter 0.3s ease;
      opacity: 0.5;
      filter: grayscale(0.5);
    }

    .app-item img {
      width: 36px;
      height: 36px;
      display: block;
    }

    .app-item.active {
      opacity: 1;
      filter: none;
      transform: translateY(-2px);
    }

    /* Kropki pod ikonami */
    .app-dots {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(230, 237, 243, 0.2);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .dot.active {
      background: var(--color-accent);
      box-shadow: 0 0 6px var(--color-accent);
    }

    /* Panel opisu */
    .app-desc {
      margin-top: 1.5rem;
      width: 220px;
      padding: 1.2rem;
      background: transparent;
      border: none;
      border-radius: 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      line-height: 1.5;
      color: rgba(230, 237, 243, 0.7);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      min-height: 120px;
      max-height: calc(100vh - 2.5rem - 36px - 1.5rem - 2rem);
    }

    .app-desc.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .app-desc strong {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .app-desc .desc-body {
      flex: 1;
    }

    .app-desc .desc-footer {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.65rem;
      color: rgba(230, 237, 243, 0.35);
      font-style: italic;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at center, #000000 85%, #0a0f14 100%);
      overflow: hidden;
    }


    .logo-container {
      position: relative;
      z-index: 1;
      animation: fadeInScale 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      margin-right: 7%;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    .logo-container img {
      width: min(570px, 71vw);
      height: auto;
      display: block;
    }

    /* ── TELEFON W PIONIE: navbar na dole ── */
    @media (max-width: 900px) and (min-height: 500px) {
      .nav-left {
        position: fixed;
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
        transform: none;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        padding: 0.8rem 0.3rem;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255,255,255,0.06);
        width: 100vw;
        box-sizing: border-box;
      }
      .app-showcase { display: none; }
      .nav-link {
        font-size: 0.65rem;
        padding-left: 0;
        white-space: nowrap;
        letter-spacing: 0.06em;
        flex-shrink: 1;
      }
      .nav-link::before {
        display: none;
      }
      .hero {
        justify-content: flex-start;
        padding-top: 12vh;
      }
      .logo-container img {
        width: min(500px, 92vw);
      }
    }


    /* ── TELEFON W POZIOMIE: sidebar z lewej ── */
    @media (max-width: 900px) and (max-height: 500px) {
      .nav-left {
        left: 1rem;
        right: auto;
        top: 50%;
        bottom: auto;
        transform: translateY(-50%);
        flex-direction: column;
        gap: 1.5rem;
        padding: 0;
        background: none;
        backdrop-filter: none;
        border-top: none;
        width: auto;
        justify-content: flex-start;
      }
      .nav-link {
        font-size: 2.2rem;
        padding-left: 1.6rem;
      }
      .nav-link::before {
        display: block;
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(230, 237, 243, 0.2);
        content: '';
      }
      .nav-link:hover::before,
      .nav-link.active::before {
        background: var(--color-accent);
        box-shadow: 0 0 8px var(--color-accent);
      }
      .app-showcase { display: none; }
      .hero {
        justify-content: flex-start;
        padding-left: 25vw;
      }
      .logo-container img {
        width: min(400px, 70vw);
      }
    }
  </style>
</head>
<body>
  <nav class="nav-sidebar nav-left">
    <a href="#projekty" class="nav-link">Projekty</a>
    <a href="#artykuly" class="nav-link">Artykuły</a>
    <a href="#o-mnie" class="nav-link">O mnie</a>
    <a href="#pomysly" class="nav-link">Pomysły</a>
    <a href="#kontakt" class="nav-link">Kontakt</a>
  </nav>

  <div class="app-wrapper">
    <div class="app-showcase" id="appShowcase">
      <div class="app-item active" data-name="TMK Platform" data-desc="Automatyczny trading: alerty TradingView przez FastAPI → MT5. Multi-terminal, Cerebrus, Wyrocznia.">
        <img src="/assets/images/icon-tmk.png" alt="TMK Platform" width="36" height="36">
      </div>
      <div class="app-item" data-name="PC2 Symulator" data-desc="Symulator portfela strategii. Optymalizacja GA+ILS, Walk-Forward, koszty transakcyjne.">
        <img src="/assets/images/icon-pc2.png" alt="PC2 Symulator" width="36" height="36">
      </div>
      <div class="app-item" data-name="Komparator" data-desc="Porównanie danych świecowych MT5 vs TradingView. Tick size, time shift, raporty.">
        <img src="/assets/images/icon-comparator.png" alt="Komparator" width="36" height="36">
      </div>
      <div class="app-item" data-name="Downloader" data-desc="Pobieranie danych świecowych z TradingView przez WebSocket. CSV gotowe do analizy.">
        <img src="/assets/images/icon-downloader.png" alt="Downloader" width="36" height="36">
      </div>
    </div>

    <div class="app-dots" id="appDots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="app-desc" id="appDesc">
      <strong></strong>
      <span class="desc-body"></span>
      <span class="desc-footer">Każda z nich zbudowana w 100% z pomocą AI</span>
    </div>
  </div>

  <div class="hero">
    <div class="logo-container">
      <img
        src="/assets/images/logo-hero.webp"
        alt="TMK Suite Logo"
        width="1600"
        height="1519"
      >
    </div>
  </div>

  <script>
    (function() {
      var items = document.querySelectorAll('.app-item');
      var dots = document.querySelectorAll('.dot');
      var descPanel = document.getElementById('appDesc');
      var descStrong = descPanel.querySelector('strong');
      var descSpan = descPanel.querySelector('.desc-body');
      var current = 0;
      var total = items.length;
      var interval = 4000;
      var timer;

      function showItem(i) {
        items.forEach(function(el) { el.classList.remove('active'); });
        dots.forEach(function(d) { d.classList.remove('active'); });
        items[i].classList.add('active');
        dots[i].classList.add('active');
        descStrong.textContent = items[i].dataset.name;
        descSpan.textContent = items[i].dataset.desc;
        descPanel.classList.add('visible');
        current = i;
      }

      function rotate() {
        showItem((current + 1) % total);
      }

      function startTimer() {
        timer = setInterval(rotate, interval);
      }

      function stopTimer() {
        clearInterval(timer);
      }

      // Init: show first
      showItem(0);
      startTimer();

      // Hover: pause, show that item
      items.forEach(function(item, i) {
        item.addEventListener('mouseenter', function() {
          stopTimer();
          showItem(i);
        });
        item.addEventListener('mouseleave', function() {
          startTimer();
        });
      });
    })();
  </script>
</body>
</html>
