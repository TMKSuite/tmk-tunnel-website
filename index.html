<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TMK Suite — Solo System Architect. Platforma tradingowa, symulator portfela, komparator danych i downloader świec. Wszystko zbudowane z pomocą AI.">
  <meta name="author" content="TMK Suite">
  <meta property="og:title" content="TMK Suite — Solo System Architect">
  <meta property="og:description" content="Profesjonalne narzędzia do handlu algorytmicznego. Zbudowane w 100% z pomocą AI.">
  <meta property="og:image" content="https://tmk-tunnel.pl/assets/images/og-image.webp">
  <meta property="og:url" content="https://tmk-tunnel.pl">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>TMK Suite — Solo System Architect</title>
  <link rel="icon" type="image/x-icon" href="/assets/images/tmk-favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #000000;
      --color-text: #E6EDF3;
      --color-accent: #58A6FF;
      --color-accent-glow: rgba(88, 166, 255, 0.12);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      font-family: 'Inter', sans-serif;
      color: var(--color-text);
    }

    /* ── NAVBAR BOCZNY ── */
    .nav-sidebar {
      position: fixed;
      left: 2.5rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeInNav 1s 0.3s ease both;
    }

    @keyframes fadeInNav {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .nav-link {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(230, 237, 243, 0.45);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s ease, opacity 0.3s ease;
      position: relative;
      padding-left: 1.4rem;
      opacity: 0;
      animation: fadeInLink 0.5s ease forwards;
    }
    .nav-link:nth-child(1) { animation-delay: 0.4s; }
    .nav-link:nth-child(2) { animation-delay: 0.65s; }
    .nav-link:nth-child(3) { animation-delay: 0.9s; }
    .nav-link:nth-child(4) { animation-delay: 1.15s; }

    @keyframes fadeInLink {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .nav-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(230, 237, 243, 0.2);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--color-accent);
    }

    .nav-link:hover::before,
    .nav-link.active::before {
      background: var(--color-accent);
      box-shadow: 0 0 8px var(--color-accent);
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      position: relative;
      background: radial-gradient(ellipse at center, #000000 85%, #0a0f14 100%);
      overflow: hidden;
    }


    .logo-container {
      position: relative;
      z-index: 1;
      animation: fadeInScale 1.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    .logo-container img {
      width: min(600px, 75vw);
      height: auto;
      display: block;
    }

    /* ── MOBILE ── */
    @media (max-width: 900px), (max-height: 550px) {
      .nav-sidebar {
        position: fixed;
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
        transform: none;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        padding: 0.8rem 0.3rem;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255,255,255,0.06);
        width: 100vw;
        box-sizing: border-box;
      }
      .nav-link {
        font-size: 0.65rem;
        padding-left: 0;
        white-space: nowrap;
        letter-spacing: 0.06em;
        flex-shrink: 1;
      }
      .nav-link::before {
        display: none;
      }
      .logo-container img {
        width: min(350px, 80vw);
      }
    }
  </style>
</head>
<body>
  <nav class="nav-sidebar">
    <a href="#projekty" class="nav-link">Projekty</a>
    <a href="#artykuly" class="nav-link">Artykuły</a>
    <a href="#o-mnie" class="nav-link">O mnie</a>
    <a href="#pomysly" class="nav-link">Pomysły</a>
  </nav>

  <div class="hero">
    <div class="logo-container">
      <img
        src="/assets/images/logo-hero.webp"
        alt="TMK Suite Logo"
        width="1600"
        height="1519"
      >
    </div>
  </div>
</body>
</html>
